<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

    <div id="app" class="app">

        <ul class="nav nav-tabs bg-dark">
            <li class="nav-item">
                <a class="nav-link text-warning" aria-current="page" href="/">main</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="#">config</a>
            </li>
        </ul>

        <div class="container mt-4">

            <form id="form-config">
                <div class="form-group">
                    <label for="" class="form-label">language</label>
                    <select name="language" id="" class="form-control">
                        <option value="en-us">English</option>
                    </select>
                </div>

                <div class="form-group mt-3">
                    <label for="" class="form-label">groq token</label>
                    <input name="groqToken" type="text" class="form-control" value="{{ .GroqToken }}">
                </div>

                <div class="form-group mt-3">
                    <button type="submit" class="btn btn-outline-nebula">save</button>
                </div>

            </form>

        </div>

    </div>

    <script src="/static/js/config.js"></script>
</body>

</html>
