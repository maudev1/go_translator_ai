<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/css/selectize.bootstrap5.css"
        integrity="sha512-pZE3NzBgokXUM9YLBGQIw99omcxiRdkMhZkz0o7g0VjC0tCFlBUqbcLKUuX8+jfsZgiZNIWFiLuZpLxXoxi53w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/js/selectize.min.js"
        integrity="sha512-IOebNkvA/HZjMM7MxL0NYeLYEalloZ8ckak+NDtOViP7oiYzG5vn6WVXyrJDiJPhl4yRdmNAG49iuLmhkUdVsQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <link rel="stylesheet" href="/static/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

    <div id="app" class="app">

        <ul class="nav nav-tabs bg-dark">
            <li class="nav-item">
                <a class="nav-link text-warning" aria-current="page" href="/">main</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="#">config</a>
            </li>
        </ul>

        <div class="container mt-5">

            <div class="row">

                <div class="col-4">
                    <strong>Basic Settings</strong>
                </div>

                <div class="col-8">
                    <form id="form-config">

                        <!-- <h2>Basic</h2> -->

                        <div class="form-group">
                            <label for="language" class="form-label">Language</label>
                            <select name="language" id="language" class="form-control">
                            </select>
                        </div>

                        <div class="form-group mt-3 mb-3">
                            <label for="groq-token" class="form-label">Groq Token</label>
                            <input name="groqToken" type="text" class="form-control" value="{{ .GroqToken }}">
                        </div>


                        <div class="form-group mt-3 text-end">
                            <button type="submit" class="btn btn-outline-nebula">Save</button>
                        </div>

                    </form>
                </div>


            </div>
        </div>

        <hr>

        <div class="container mt-5">


            <div class="row">
                <div class="col-4">
                    <strong>Base File</strong>
                </div>

                <div class="col-8">

                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Current</th>
                                <th>Upload New File</th>
                            </tr>
                        </thead>
                        <tbody>

                            <tr>
                                <td >

                                    <p>{{ .BaseFile }}</p>

                                </td>

                                <td>

                                    <form id="file-uploader" enctype="multipart/form-data">
                                        <div class="input-group mt-3">
                                            <input id="base-file" type="file" name="baseFile" class="form-control">
                                            <button class="btn btn-outline-nebula" type="submit">upload</button>
                                        </div>

                                    </form>
                                </td>
                            </tr>

                        </tbody>
                    </table>


                </div>

            </div>

        </div>

    </div>
    <script src="/static/js/helpers.js"></script>
    <script src="/static/js/config.js"></script>
</body>

</html>
