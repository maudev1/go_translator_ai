<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app" class="app">

        <ul class="nav nav-tabs bg-dark">
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">main</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-warning" href="/config">config</a>
            </li>
        </ul>

        <div class="container mt-4">
            <h2 id="index-position"></h2>
        </div>

        <div class="container mt-4">

            <div id="content" class="content">

                <div id="current-text" class="current-text">

                    <textarea name="" id="editor">
                        ...                        
                    </textarea>
                    <div id="vertical-bar" class="vertical-bar">
                        <a><i class="fa-solid fa-angle-up up "></i></a>
                        <a><i class="fa-solid fa-angle-down down"></i></a>
                    </div>
                </div>

            </div>
        </div>


        <div class="control-bar">
            <!-- <hr> -->
            <div class="container">
                <div class="form-group">
                    <button class="btn btn-outline-warning"> <i class="fas fa-chevron-up"></i> PREV</button>
                    <button class="btn btn-outline-nebula">Google Translator</button>
                    <button class="btn btn-outline-nebula">AI Translator</button>
                    <button class="btn btn-outline-primary">NEXT <i class="fas fa-chevron-down"></i></button>
                </div>
            </div>
        </div>
    </div>

    <style>
        :root {
            --primary-color: rgb(226, 65, 65);
            --nebula-color: rgb(161, 63, 206);
            --up-color: #ffc107;
            --down-color: #0d6efd;

        }

        .btn-outline-nebula {
            border: solid 1px var(--nebula-color);
            color: var(--nebula-color)
        }

        .btn-outline-nebula:hover {
            background-color: var(--nebula-color);
            color: white;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            /* background-color: silver; */
        }

        .nav-tab {
            box-shadow: 0 0 10px gray;

        }

        .control-bar {
            position: fixed;
            bottom: 30px;
            width: 100%;
        }

        .control-bar {
            padding-top: 20px;
            padding-bottom: 20px;
            box-shadow: 0 0 10px rgb(0, 0, 0);
        }

        .control-bar .form-group {
            display: flex;
            justify-content: space-around;
            /* height: 300px; */
        }

        .content {
            position: relative;
        }

        .overlay {
            position: fixed;

            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(10px);
            /* safari */
            background: rgba(255, 255, 255, 0.2);

            width: 100%;
            height: 100%;
        }

        .current-text {
            /* width: 80%; */
            /* position: fixed; */
            /* bottom: 50%; */
            /* top: 50%; */
            /* left: 50%; */
            /* transform: translate(-50%, -50%); */
            display: flex;
            flex-direction: row;
            display: flex;
            height: 200px;

        }

        .current-text textarea {
            width: 100%;
        }

        .nav,
        .content,
        .control-bar {
            background-color: #14171a46;

        }

        .vertical-bar {

            flex-direction: column;
            /* right: 0; */
            /* bottom: 50%; */
            /* z-index: 1000; */
            display: flex;
            height: 100%;
            justify-content: space-between;

        }

        .vertical-bar a {
            border: solid 1px;
            background-color: rgba(255, 255, 255, 0);
            cursor: pointer;
        }

        .vertical-bar a:hover i.up {
            color: white;
            background-color: var(--up-color);
        }

        .vertical-bar a:hover i.down {
            color: white;
            background-color: var(--down-color);
        }


        .vertical-bar a i.up {
            font-size: 5rem;
            color: var(--up-color);
        }

        .vertical-bar a i.down {
            font-size: 5rem;
            color: var(--down-color);
        }

        .vertical-bar i.active.up {
            color: white;
            background-color: var(--up-color);
        }

        .vertical-bar i.active.down {
            color: white;
            background-color: var(--down-color);
        }
    </style>

    <script>
        const app = {

            currentPosition: 0,
            lastPosition: 0,

            init() {

                app.showPosition();

                app.updatePreview(app.currentPosition);

                document.getElementById('content').addEventListener('wheel', (event) => {

                    if (event.deltaY > 1) {
                        console.log('baixo')
                    } else {
                        console.log('cima')

                    }

                    app.selectizeWord(event.deltaY);

                    app.showPosition();

                })





            },
            async wordList() {

                let data = await fetch('/load-base-text')
                let results = await data.json();

                if (results) {
                    return results;
                }


                return ['uva', 'pera', 'maca', 'salada mista'];
            },
            selectizeWord(position) {

                let downSelector = document.querySelector('.down')
                let upSelector = document.querySelector('.up')

                downSelector.classList.remove('active')
                upSelector.classList.remove('active')

                if (position > 1) {

                    downSelector.classList.add('active')

                } else {

                    upSelector.classList.add('active')


                }

                setTimeout(function () {
                    downSelector.classList.remove('active')
                    upSelector.classList.remove('active')
                }, 1000)


            },
            updatePreview(index) {

                app.wordList().then((text) => {
                    document.getElementById('editor').innerHTML = text[index].value

                })


            },
            showPosition() {

                app.wordList().then((texts) => {

                    let initial = 0;
                    let lastPosition = texts.length;
                    let position = app.currentPosition + 1


                    if (position == lastPosition) {

                        app.updatePreview(initial)

                        app.currentPosition = initial;

                    } else {

                        app.updatePreview(position);

                        app.currentPosition = position;
                    }


                    document.getElementById('index-position').innerHTML = `${app.currentPosition + 1}/${lastPosition}`

                })


            }




        };


        (function () {

            'use strict';
            app.init();

        })();



    </script>
</body>

</html>
